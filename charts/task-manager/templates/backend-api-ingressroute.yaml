{{- if .Values.flagger.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "task-manager.backend.fullname" . }}-api
  namespace: {{ include "task-manager.namespace" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.flagger.api.host }}`)
      kind: Rule
      services:
        - name: {{ include "task-manager.backend.fullname" . }}
          kind: TraefikService
          port: {{ .Values.backend.service.port }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.flagger.api.tls.secretName }}
  {{- end }}
{{- end }}
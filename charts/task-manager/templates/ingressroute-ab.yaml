{{- if and .Values.ingress.enabled .Values.frontend.ab.enabled }}
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: {{ include "task-manager.frontend.fullname" . }}-split
  namespace: {{ include "task-manager.namespace" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  weighted:
    sticky:
      cookie:
        name: frontend-version
        httpOnly: true
        secure: true
    services:
      - name: {{ include "task-manager.frontend.fullname" . }}
        port: {{ .Values.frontend.service.port }}
        weight: {{ .Values.frontend.ab.weightStable }}
      - name: {{ include "task-manager.frontend.canary.fullname" . }}
        port: {{ .Values.frontend.service.port }}
        weight: {{ .Values.frontend.ab.weightCanary }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "task-manager.fullname" . }}
  namespace: {{ include "task-manager.namespace" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: {{ include "task-manager.backend.fullname" . }}
          port: {{ .Values.backend.service.port }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/`) && Header(`X-Canary`,`true`)
      kind: Rule
      priority: 20
      services:
        - name: {{ include "task-manager.frontend.canary.fullname" . }}
          port: {{ .Values.frontend.service.port }}
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/`)
      kind: Rule
      priority: 10
      services:
        - name: {{ include "task-manager.frontend.fullname" . }}-split
          kind: TraefikService
  {{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
